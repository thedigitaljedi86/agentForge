# Run the whole DevAgent platform locally:
#
#   docker compose up --build
#
# Then open:
#   http://localhost:5080/          -> Agent-status dashboard
#   http://localhost:5080/swagger   -> Hub API (manual triggers)
#   http://localhost:5080/hangfire  -> Schedule (recurring agents)
#   http://localhost:5081/swagger   -> Runner API (validation gate)
#
# The Hub forwards validated jobs to the Runner over the internal network.

name: devagent

services:
  runner:
    build:
      context: .
      args:
        PROJECT: src/DevAgent.Runner.Api/DevAgent.Runner.Api.csproj
        DLL: DevAgent.Runner.Api.dll
    ports:
      - "5081:8080"

  hub:
    build:
      context: .
      args:
        PROJECT: src/DevAgent.Hub.Api/DevAgent.Hub.Api.csproj
        DLL: DevAgent.Hub.Api.dll
    environment:
      # Reach the Runner by its compose service name on the internal network.
      - Runner__BaseUrl=http://runner:8080
    ports:
      - "5080:8080"
    depends_on:
      - runner
